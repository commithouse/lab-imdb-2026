# Redis Cluster 6 nodes (3 masters + 3 replicas)
# Uso: docker compose -f docker-compose.cluster.yml up -d
# Depois: ver README-CLUSTER.md ou rodar o comando "create cluster" abaixo.

services:
  redis-node-0:
    image: redis:7.0-alpine
    container_name: redis-node-0
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-0.conf
      --port 6379
    ports:
      - "6379:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-0:/data

  redis-node-1:
    image: redis:7.0-alpine
    container_name: redis-node-1
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-1.conf
      --port 6379
    ports:
      - "6380:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-1:/data

  redis-node-2:
    image: redis:7.0-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-2.conf
      --port 6379
    ports:
      - "6381:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-2:/data

  redis-node-3:
    image: redis:7.0-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-3.conf
      --port 6379
    ports:
      - "6382:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-3:/data

  redis-node-4:
    image: redis:7.0-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-4.conf
      --port 6379
    ports:
      - "6383:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-4:/data

  redis-node-5:
    image: redis:7.0-alpine
    container_name: redis-node-5
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes-5.conf
      --port 6379
    ports:
      - "6384:6379"
    networks:
      - redis-cluster
    volumes:
      - redis-data-5:/data

networks:
  redis-cluster:
    driver: bridge

volumes:
  redis-data-0:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
